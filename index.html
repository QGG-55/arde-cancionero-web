<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ARDE Cancionero</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="landing" class="landing">
      <p class="eyebrow">ARDE CREATOR</p>
      <p class="landing-copy">Elige el cancionero que quieres abrir.</p>
      <div id="songbookChoices" class="songbook-choices"></div>
    </section>
    <header class="topbar">
      <button id="homeButton" class="home-button" type="button">Cancioneros</button>
      <p id="currentSongbook" class="eyebrow">ARDE CREATOR</p>
      <div class="filters">
        <input id="search" type="search" placeholder="Buscar cancion" autocomplete="off" />
        <select id="authorFilter" aria-label="Autor"></select>
        <select id="tagFilter" aria-label="Etiqueta"></select>
      </div>
    </header>
    <main class="layout">
      <nav id="songList" class="song-list" aria-label="Canciones"></nav>
      <article class="song-view">
        <div class="song-heading">
          <div>
            <p id="songPage" class="song-page"></p>
            <h2 id="songTitle">Selecciona una cancion</h2>
            <p id="songCapo" class="song-capo"></p>
            <p id="songAuthor" class="song-author"></p>
            <p id="songTags" class="song-tags"></p>
          </div>
          <div class="mode-switch" aria-label="Vista">
            <button id="lyricsOnlyButton" type="button">Letra</button>
            <button id="withChordsButton" type="button" class="active">Acordes</button>
          </div>
          <button id="autoscrollButton" class="autoscroll-button" type="button">Autoscroll</button>
        </div>
        <div id="songBody" class="song-body"></div>
      </article>
    </main>
    <script src="app.js"></script>
  </body>
</html>
